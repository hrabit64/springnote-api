openapi: 3.0.1
info:
  title: SpringNote API
  description: SpringNote API 문서
  version: 1.0.0
servers:
- url: https://api.springnote.blog
tags: []
paths:
  /api/v1/bad-word:
    get:
      tags:
      - BadWord API
      summary: "금칙어 정보를 조회합니다. (AUTH-LEVEL : ADMIN)"
      description: |+
        * 사용 가능 쿼리 파라미터 (대소문자 구분 없음)

        |  키  |                 설명                  |        제약        |
        | :--: | :-----------------------------------: | :----------------: |
        | type |     true 비속어, false  허용단어      | 1 종류만 입력 가능 |
        | word | 해당 word를 포함하는 단어를 찾습니다. | 공백이 없는 2~10자 |

        * 페이징

        해당 API는 페이징을 지원합니다.

        |  키  |          설명           |            제약            |      기본값      |
        | :--: | :---------------------: | :------------------------: | :--------------: |
        | size |      페이징 사이즈      |        최대 100까지        |        20        |
        | page | 페이지 넘버 *0부터 시작 |                            |        0         |
        | sort |        정렬 옵션        | *아래 사용 가능 키만 가능* | id;DESC |

        사용 가능한 sort키는 아래와 같습니다. *모든 Sort 사용시 방향을 지정하지 않으면 ASC 로 동작합니다. (대소문자 구분 없음)*

        |        키        |     설명      |
        | :--------------: | :-----------: |
        |        id        |   금칙어 id  |
        |      word       |  금칙어 단어  |
        |     type      |  금칙어 유형  |

      operationId: badWord/getBadWords
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BadWord.PagedResponse'
              examples:
                badWord/getBadWords:
                  value: |-
                    {
                      "_embedded" : {
                        "bad_words" : [ {
                          "id" : 1,
                          "word" : "word",
                          "is_bad_word" : true,
                          "_links" : {
                            "self" : {
                              "href" : "http://localhost:8080/api/v1/bad-word/1"
                            },
                            "delete" : {
                              "href" : "http://localhost:8080/api/v1/bad-word/1"
                            }
                          }
                        } ]
                      },
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/bad-word?page=0&size=20&sort=id,desc"
                        }
                      },
                      "page" : {
                        "size" : 20,
                        "totalElements" : 1,
                        "totalPages" : 1,
                        "number" : 0
                      }
                    }
    post:
      tags:
      - BadWord API
      summary: "금칙어를 생성합니다. (AUTH-LEVEL : ADMIN)"
      description: "금칙어를 생성합니다. (AUTH-LEVEL : ADMIN)"
      operationId: badWord/createBadWord
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/BadWord.Create'
            examples:
              badWord/createBadWord:
                value: |-
                  {
                    "word" : "15자이하",
                    "is_bad_word" : true
                  }
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/BadWord.Response'
              examples:
                badWord/createBadWord:
                  value: |-
                    {
                      "id" : 1,
                      "word" : "word",
                      "is_bad_word" : true,
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/bad-word/1"
                        },
                        "delete" : {
                          "href" : "http://localhost:8080/api/v1/bad-word/1"
                        }
                      }
                    }
  /api/v1/image:
    get:
      tags:
      - Image API
      summary: "업로드된 이미지 정보를 조회합니다. (AUTH-LEVEL : ADMIN)"
      description: |+
        * 페이징

        해당 API는 페이징을 지원합니다.

        |  키  |          설명           |            제약            |      기본값      |
        | :--: | :---------------------: | :------------------------: | :--------------: |
        | size |      페이징 사이즈      |        최대 100까지        |        20        |
        | page | 페이지 넘버 *0부터 시작 |                            |        0         |
        | sort |        정렬 옵션        | *아래 사용 가능 키만 가능* | createdDate;DESC |

        사용 가능한 sort키는 아래와 같습니다. *모든 Sort 사용시 방향을 지정하지 않으면 ASC 로 동작합니다. (대소문자 구분 없음)*

        |        키        |     설명      |
        | :--------------: | :-----------: |
        |        id        |     ID   |
        |      postId      |  포스트 ID  |
        |     createdAt    |  생성일 |

      operationId: image/getImages
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image.PageResponse'
              examples:
                image/getImages:
                  value: |-
                    {
                      "content" : [ {
                        "id" : 1,
                        "converted_name" : "convertedName.jpg",
                        "width" : 100,
                        "height" : 100,
                        "created_at" : "2002-08-28T00:00:00",
                        "format" : "webp",
                        "post_id" : 1
                      } ],
                      "pageable" : {
                        "pageNumber" : 0,
                        "pageSize" : 20,
                        "sort" : {
                          "empty" : false,
                          "sorted" : true,
                          "unsorted" : false
                        },
                        "offset" : 0,
                        "paged" : true,
                        "unpaged" : false
                      },
                      "totalElements" : 1,
                      "totalPages" : 1,
                      "last" : true,
                      "size" : 20,
                      "number" : 0,
                      "sort" : {
                        "empty" : false,
                        "sorted" : true,
                        "unsorted" : false
                      },
                      "numberOfElements" : 1,
                      "first" : true,
                      "empty" : false
                    }
    post:
      tags:
      - Image API
      summary: "이미지를 업로드합니다. (AUTH-LEVEL : ADMIN)"
      description: "이미지를 업로드합니다. (AUTH-LEVEL : ADMIN)"
      operationId: image/uploadImage
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Image.CreateRequest'
            examples:
              image/uploadImage:
                value: |-
                  {
                    "image" : "Fuw2zk5DkTGgN3TbznEhWOW9f2G/oloxX/VTJ4URW3N1pvzYm6aa3ATy4F9gzNurfWrd6ZJxDlN3dM+uXTAx2OixwSDsoby2YBPw",
                    "postId" : null
                  }
      responses:
        "200":
          description: "200"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image.Response'
              examples:
                image/uploadImage:
                  value: |-
                    {
                      "message" : "convertedName.jpg"
                    }
  /api/v1/post:
    get:
      tags:
      - Post API
      summary: "포스트를 조회합니다. (AUTH-LEVEL : NONE)"
      description: |+
        * 사용 가능 쿼리 파라미터 (대소문자 구분 없음)

        |       키       |                             설명                             |                 제약                 |                기본값                |
        | :------------: | :----------------------------------------------------------: | :----------------------------------: | :----------------------------------: |
        |    postType    |                     포스트의 유형입니다.                     |                                      |                  x                   |
        |     series     |                   포스트의 시리즈 입니다.                    |                                      |                  x                   |
        |      tag       |                  포스트의 태그 정보 입니다.                  | 최대 10개 까지만 사용가능, 중복 불가 |                  x                   |
        | isOnlyOpenPost | 공개된 포스트만 검색할지 여부입니다. true면 공개된 포스트만 검색합니다. *단  false 사용시에는 관리자 권한을 요구합니다.* |            1개만 사용가능            | 유저일경우 true, 관리자일 경우 false |

        * 페이징

        해당 API는 페이징을 지원합니다.

        |  키  |          설명           |            제약            |      기본값      |
        | :--: | :---------------------: | :------------------------: | :--------------: |
        | size |      페이징 사이즈      |        최대 100까지        |        20        |
        | page | 페이지 넘버 *0부터 시작 |                            |        0         |
        | sort |        정렬 옵션        | *아래 사용 가능 키만 가능* | createdDate;DESC |

        사용 가능한 sort키는 아래와 같습니다. *모든 Sort 사용시 방향을 지정하지 않으면 ASC 로 동작합니다. (대소문자 구분 없음)*

        |        키        |     설명      |
        | :--------------: | :-----------: |
        |        id        |   포스트 ID   |
        |      title       |  포스트 제목  |
        |     content      |  포스트 본문  |
        |      isOpen      |   공개 여부   |
        |      series      |    시리즈     |
        | lastModifiedDate | 마지막 수정일 |
        |   createdDate    |    생성일     |

        * 키워드 검색
        제목, 본문, 제목 + 본문에 대한 키워드 검색을 지원합니다. 쿼리파라미터에 아래 키를 사용하면 키워드 검색을 수행할 수 있습니다. 이때 아래 두개의 키가 모두 입력되지 않았을 경우 에러가 발생합니다.

        |     키     |                            설명                            |         제약          |
        | :--------: | :--------------------------------------------------------: | :-------------------: |
        |  keyword   |                       검색할 키워드                        |        2~20자         |
        | searchMode | 검색 모드, TITLE(제목),CONTENT(본문),MIX(제목+본문) 중 1택 | 1개의 옵션만 설정가능 |

      operationId: post/getPosts
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Post.PagedSimple'
              examples:
                post/getPosts:
                  value: |-
                    {
                      "_embedded" : {
                        "posts" : [ {
                          "id" : 1,
                          "title" : "title",
                          "thumbnail" : "thumbnail",
                          "series" : {
                            "id" : 1,
                            "name" : "name"
                          },
                          "tags" : [ {
                            "id" : 1,
                            "name" : "tag1"
                          }, {
                            "id" : 2,
                            "name" : "tag2"
                          } ],
                          "post_type" : {
                            "id" : 1,
                            "name" : "name"
                          },
                          "created_at" : "2002-08-28T00:00:00",
                          "last_updated_at" : "2002-08-28T00:00:00",
                          "enabled" : true,
                          "_links" : {
                            "self" : {
                              "href" : "http://localhost:8080/api/v1/post/1"
                            },
                            "delete" : {
                              "href" : "http://localhost:8080/api/v1/post/1"
                            },
                            "update" : {
                              "href" : "http://localhost:8080/api/v1/post/1"
                            },
                            "update-status" : {
                              "href" : "http://localhost:8080/api/v1/post/1/status"
                            }
                          }
                        } ]
                      },
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/post?page=0&size=20&sort=createdDate,desc"
                        }
                      },
                      "page" : {
                        "size" : 20,
                        "totalElements" : 1,
                        "totalPages" : 1,
                        "number" : 0
                      }
                    }
    post:
      tags:
      - Post API
      summary: "포스트를 생성합니다. (AUTH-LEVEL : ADMIN)"
      description: "포스트를 생성합니다. (AUTH-LEVEL : ADMIN)"
      operationId: post/createPost
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Post.Create'
            examples:
              post/createPost:
                value: |-
                  {
                    "series_id" : 1,
                    "tags" : [ {
                      "id" : 1
                    }, {
                      "id" : 2
                    } ],
                    "content" : "content",
                    "title" : "title",
                    "thumbnail" : "http://springnote.blog",
                    "post_type_id" : 1,
                    "enabled" : true
                  }
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Post.Detail'
              examples:
                post/createPost:
                  value: |-
                    {
                      "id" : 1,
                      "title" : "title",
                      "content" : {
                        "plain_text" : "plainText",
                        "editor_text" : "editorText"
                      },
                      "thumbnail" : "thumbnail",
                      "series" : {
                        "id" : 1,
                        "name" : "name"
                      },
                      "tags" : [ {
                        "id" : 1,
                        "name" : "tag1"
                      }, {
                        "id" : 2,
                        "name" : "tag2"
                      } ],
                      "post_type" : {
                        "id" : 1,
                        "name" : "name"
                      },
                      "created_at" : "2002-08-28T00:00:00",
                      "last_updated_at" : "2002-08-28T00:00:00",
                      "enabled" : true,
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/post/1"
                        },
                        "delete" : {
                          "href" : "http://localhost:8080/api/v1/post/1"
                        },
                        "update" : {
                          "href" : "http://localhost:8080/api/v1/post/1"
                        },
                        "update-status" : {
                          "href" : "http://localhost:8080/api/v1/post/1/status"
                        }
                      }
                    }
  /api/v1/post-type:
    get:
      tags:
      - PostType API
      summary: 포스트 타입을 가져옵니다.
      description: |+
        * 페이징

        해당 API는 페이징을 지원합니다.

        |  키  |          설명           |            제약            |      기본값      |
        | :--: | :---------------------: | :------------------------: | :--------------: |
        | size |      페이징 사이즈      |        최대 20까지        |        20        |
        | page | 페이지 넘버 *0부터 시작 |                            |        0         |
        | sort |        정렬 옵션        | *아래 사용 가능 키만 가능* | id;DESC |

        사용 가능한 sort키는 아래와 같습니다. *모든 Sort 사용시 방향을 지정하지 않으면 ASC 로 동작합니다. (대소문자 구분 없음)*

        |        키        |     설명      |
        | :--------------: | :-----------: |
        |        id        |   타입 ID   |
        |       name       |  이름  |

      operationId: postType/getPostTypes
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/PostType.Response'
              examples:
                postType/getPostTypes:
                  value: |-
                    {
                      "_embedded" : {
                        "post_types" : [ {
                          "id" : 1,
                          "name" : "name"
                        } ]
                      },
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/post-type?page=0&size=20&sort=id,desc"
                        }
                      },
                      "page" : {
                        "size" : 20,
                        "totalElements" : 1,
                        "totalPages" : 1,
                        "number" : 0
                      }
                    }
  /api/v1/series:
    get:
      tags:
      - Series API
      summary: 시리즈를 조회합니다.
      description: |+
        * 사용 가능 쿼리 파라미터 (대소문자 구분 없음)

        |       키       |                             설명                             |                 제약                 |                기본값                |
        | :------------: | :----------------------------------------------------------: | :----------------------------------: | :----------------------------------: |
        |    name    |                       검색할 이름.                             |                2~40자                   |                  x                   |

        * 페이징

        해당 API는 페이징을 지원합니다.

        |  키  |          설명           |            제약            |      기본값      |
        | :--: | :---------------------: | :------------------------: | :--------------: |
        | size |      페이징 사이즈      |        최대 50까지        |        20        |
        | page | 페이지 넘버 *0부터 시작 |                            |        0         |
        | sort |        정렬 옵션        | *아래 사용 가능 키만 가능* | id;DESC |

        사용 가능한 sort키는 아래와 같습니다. *모든 Sort 사용시 방향을 지정하지 않으면 ASC 로 동작합니다. (대소문자 구분 없음)*

        |        키        |     설명      |
        | :--------------: | :-----------: |
        |        id        |   시리즈 ID    |
        |      name       |  시리즈 제목  |

      operationId: series/getSeries
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Series.PagedResponse'
              examples:
                series/getSeries:
                  value: |-
                    {
                      "_embedded" : {
                        "series" : [ {
                          "id" : 1,
                          "name" : "test",
                          "description" : "test",
                          "thumbnail" : "https://springnote.blog",
                          "_links" : {
                            "self" : {
                              "href" : "http://localhost:8080/api/v1/series/1"
                            },
                            "delete" : {
                              "href" : "http://localhost:8080/api/v1/series/1"
                            },
                            "update" : {
                              "href" : "http://localhost:8080/api/v1/series/1"
                            }
                          }
                        } ]
                      },
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/series?page=0&size=20&sort=id,desc"
                        }
                      },
                      "page" : {
                        "size" : 20,
                        "totalElements" : 1,
                        "totalPages" : 1,
                        "number" : 0
                      }
                    }
    post:
      tags:
      - Series API
      summary: "시리즈를 생성합니다. (AUTH_LEVEL: ADMIN)"
      description: "시리즈를 생성합니다. (AUTH_LEVEL: ADMIN)"
      operationId: series/createSeries
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/Series.CreateRequest'
            examples:
              series/createSeries:
                value: |-
                  {
                    "name" : "test",
                    "description" : "test",
                    "thumbnail" : "https://springnote.blog"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Series.Response'
              examples:
                series/createSeries:
                  value: |-
                    {
                      "id" : 1,
                      "name" : "test",
                      "description" : "test",
                      "thumbnail" : "https://springnote.blog",
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/series/1"
                        },
                        "delete" : {
                          "href" : "http://localhost:8080/api/v1/series/1"
                        },
                        "update" : {
                          "href" : "http://localhost:8080/api/v1/series/1"
                        }
                      }
                    }
  /api/v1/site-content:
    post:
      tags:
      - SiteContent API
      summary: "사이트 콘텐츠를 생성합니다. (AUTH_LEVEL: ADMIN)"
      description: "사이트 콘텐츠를 생성합니다. (AUTH_LEVEL: ADMIN)"
      operationId: siteContent/createSiteContent
      requestBody:
        content:
          application/json;charset=UTF-8:
            schema:
              $ref: '#/components/schemas/SiteContent.CreateRequest'
            examples:
              siteContent/createSiteContent:
                value: |-
                  {
                    "key" : "test",
                    "content" : "test content"
                  }
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/SiteContent.Response'
              examples:
                siteContent/createSiteContent:
                  value: |-
                    {
                      "key" : "test",
                      "content" : "test content",
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/site-content/test"
                        }
                      }
                    }
  /api/v1/tag:
    get:
      tags:
      - Tag API
      summary: Tag 목록을 조회합니다.
      description: |+
        * 사용 가능 쿼리 파라미터 (대소문자 구분 없음)

        |       키       |                             설명                             |                 제약                 |                기본값                |
        | :------------: | :----------------------------------------------------------: | :----------------------------------: | :----------------------------------: |
        |    name     |                     검색할 이름입니다.                    |                   2~100자                   |                  x                   |

