    get:
      tags:
      - Comment API
      summary: "해당 댓글에 대한 답글 목록을 반환합니다.(AUTH_LEVEL: NONE)"
      description: |
        * 페이징

        해당 API는 페이징을 지원합니다.

        |  키  |          설명           |            제약            |      기본값      |
        | :--: | :---------------------: | :------------------------: | :--------------: |
        | size |      페이징 사이즈      |        최대 50까지        |        20        |
        | page | 페이지 넘버 *0부터 시작 |                            |        0         |
        | sort |        정렬 옵션        | *아래 사용 가능 키만 가능* | createdDate;DESC |

        사용 가능한 sort키는 아래와 같습니다. *모든 Sort 사용시 방향을 지정하지 않으면 ASC 로 동작합니다. (대소문자 구분 없음)*

        |        키        |     설명      |
        | :--------------: | :-----------: |
        |        id        |    댓글 id    |
        |       user       |    작성자     |
        |   createdDate    |    생성일     |
        | lastModifiedDate | 마지막 수정일 |
      operationId: Comment/getReply
      parameters:
      - name: commentId
        in: path
        description: 댓글 ID
        required: true
        schema:
          type: string
      responses:
        "200":
          description: "200"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/Comment.PagedResponse'
              examples:
                Comment/getReply:
                  value: |-
                    {
                      "_embedded" : {
                        "replies" : [ {
                          "id" : 1,
                          "post_id" : 1,
                          "content" : "test",
                          "writer" : {
                            "id" : "test",
                            "name" : "test",
                            "email" : "admin@springnote.blog",
                            "profile_img" : "https://springnote.blog",
                            "enabled" : true,
                            "admin" : true
                          },
                          "parent_id" : 1,
                          "created_date" : "2002-08-28T00:00:00",
                          "last_modified_date" : "2002-08-28T00:00:00",
                          "enabled" : false,
                          "_links" : {
                            "self" : {
                              "href" : "http://localhost:8080/api/v1/comment/1"
                            },
                            "update" : {
                              "href" : "http://localhost:8080/api/v1/comment/1"
                            },
                            "disable" : {
                              "href" : "http://localhost:8080/api/v1/comment/1/status"
                            },
                            "parent" : {
                              "href" : "http://localhost:8080/api/v1/comment/1"
                            }
                          }
                        } ]
                      },
                      "_links" : {
                        "self" : {
                          "href" : "http://localhost:8080/api/v1/comment/1/reply?page=0&size=20&sort=createdDate,desc"
                        }
                      },
                      "page" : {
                        "size" : 20,
                        "totalElements" : 1,
                        "totalPages" : 1,
                        "number" : 0
                      }
                    }
